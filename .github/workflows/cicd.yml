name: React CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies and build app
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build application
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: ./dist
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: dist

      - name: Run tests
        run: npm test -- --watchAll=false
      
      - name: Validate build Output
        run: |
          test -f dist/index.html
          echo "Build file exist"
    
  deploy-to-azure:
  runs-on: ubuntu-latest
  needs: test

  env:
    AZURE_CONTAINER_REGISTRY: testRegistry123456
    RESOURCE_GROUP: 1-19fd17ba-playground-sandbox
    CONTAINER_APP_NAME: devops-horizon-container-app

  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: react-build
        path: dist

    - name: Log in to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
        username: ${{ secrets.TEST_REGISTRY_USERNAME }}
        password: ${{ secrets.TEST_REGISTRY_PASSWORD }}



      